version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306" # Map host port 3307 to container port 3306 to avoid conflicts
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data: